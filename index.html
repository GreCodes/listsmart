<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListSmart — AI Listings for Etsy & eBay</title>

<style>
/* (UNCHANGED STYLES — keeping your UI intact) */
body { font-family: Arial, sans-serif; background:#faf6ee; margin:0; }
.container { max-width:960px; margin:auto; padding:20px; }
.upload-zone { border:2px dashed #ccc; padding:30px; text-align:center; cursor:pointer; }
.preview-thumb { width:100px; height:100px; object-fit:cover; margin:5px; }
button { cursor:pointer; padding:10px 15px; }
.error-box { color:red; margin:10px 0; display:none; }
.error-box.active { display:block; }
.loading { display:none; }
.loading.active { display:block; }
.results { display:none; }
.results.active { display:block; }
</style>
</head>

<body>

<div class="container">

<h2>ListSmart</h2>

<div>
  <label>API Key</label><br>
  <input type="password" id="apiKey" placeholder="Your Gemini API Key">
  <button onclick="saveKey()">Save</button>
</div>

<br>

<div class="upload-zone">
  <input type="file" multiple accept="image/*" onchange="handleFiles(this.files)">
  <p>Upload images</p>
</div>

<div id="previewGrid"></div>

<br>

<select id="category">
  <option value="auto">Auto-detect</option>
  <option value="fashion">Fashion</option>
  <option value="electronics">Electronics</option>
</select>

<select id="condition">
  <option value="auto">Auto-detect</option>
  <option value="new">New</option>
  <option value="used">Used</option>
</select>

<input id="userPrice" placeholder="Your price (optional)">
<input id="extraInfo" placeholder="Extra info">

<br><br>

<div class="error-box" id="errorBox"></div>

<button onclick="generate()" id="btn">Generate</button>

<div class="loading" id="loading">Generating...</div>

<div class="results" id="results">
  <h3>Result</h3>
  <pre id="output"></pre>
</div>

</div>

<script>
let uploadedImages = [];

function saveKey() {
  localStorage.setItem("gemini_key", document.getElementById("apiKey").value);
}

window.onload = () => {
  document.getElementById("apiKey").value = localStorage.getItem("gemini_key") || "";
};

function toBase64(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
}

async function handleFiles(files) {
  uploadedImages = [];
  document.getElementById("previewGrid").innerHTML = "";

  for (let f of Array.from(files).slice(0,5)) {
    const b64 = await toBase64(f);
    uploadedImages.push({b64, type:f.type});

    const img = document.createElement("img");
    img.src = `data:${f.type};base64,${b64}`;
    img.className = "preview-thumb";
    document.getElementById("previewGrid").appendChild(img);
  }
}

function showError(msg){
  const box = document.getElementById("errorBox");
  box.textContent = msg;
  box.classList.add("active");
}

function extractJSON(text){
  try {
    return JSON.parse(text);
  } catch {
    const match = text.match(/\{[\s\S]*\}/);
    if(match) return JSON.parse(match[0]);
    throw new Error("Bad JSON");
  }
}

async function generate(){
  const apiKey = document.getElementById("apiKey").value;
  const category = document.getElementById("category").value;
  const condition = document.getElementById("condition").value;
  const userPrice = document.getElementById("userPrice").value;
  const extraInfo = document.getElementById("extraInfo").value;

  document.getElementById("loading").classList.add("active");
  document.getElementById("results").classList.remove("active");

  const prompt = `
Return STRICT JSON only.

Create Etsy + eBay listings.

Category: ${category}
Condition: ${condition}
User Price: ${userPrice}
Extra: ${extraInfo}

JSON format:
{
 "item_summary": "",
 "suggested_price": "",
 "etsy": {"title":"","description":"","tags":[]},
 "ebay": {"title":"","description":"","item_specifics":[]}
}
`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              ...uploadedImages.map(i => ({
                inlineData:{ mimeType:i.type, data:i.b64 }
              })),
              { text: prompt }
            ]
          }],
          generationConfig: {
            temperature: 0.7,
            maxOutputTokens: 1800,
            responseMimeType: "application/json"
          }
        })
      }
    );

    const text = await res.text();

    if(!res.ok){
      if(res.status === 429 || res.status === 503){
        throw new Error("Gemini is busy right now. Try again in a few seconds.");
      }
      throw new Error("API error: " + text);
    }

    const data = JSON.parse(text);
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;

    const parsed = extractJSON(raw);

    document.getElementById("output").textContent =
      JSON.stringify(parsed, null, 2);

    document.getElementById("loading").classList.remove("active");
    document.getElementById("results").classList.add("active");

  } catch(e){
    document.getElementById("loading").classList.remove("active");
    showError(e.message);
  }
}
</script>

</body>
</html>
